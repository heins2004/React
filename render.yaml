databases:
  - name: art-gallery-db
    plan: free

services:
  - type: web
    name: art-gallery-api
    runtime: python
    rootDir: server
    plan: free
    buildCommand: bash build.sh
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: art-gallery-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: art-gallery
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
